{{- if not .Values.envFromSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "katra.fullname" . }}-secret
  labels:
    {{- include "katra.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MongoDB connection string
  MONGODB_URI: {{ include "katra.mongodbUri" . | quote }}
  # Redis connection string
  REDIS_URL: {{ include "katra.redisUrl" . | quote }}
  # API key for authenticating agent connections
  {{- if .Values.secrets.KATRA_API_KEY }}
  KATRA_API_KEY: {{ .Values.secrets.KATRA_API_KEY | quote }}
  {{- else }}
  KATRA_API_KEY: {{ randAlphaNum 32 | quote }}
  {{- end }}
  {{- if .Values.secrets.JWT_SECRET }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.LLM_API_KEY }}
  LLM_API_KEY: {{ .Values.secrets.LLM_API_KEY | quote }}
  {{- end }}
  {{- if .Values.secrets.EMBEDDING_API_KEY }}
  EMBEDDING_API_KEY: {{ .Values.secrets.EMBEDDING_API_KEY | quote }}
  {{- end }}
  {{- if .Values.secrets.AWS_ACCESS_KEY_ID }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.AWS_ACCESS_KEY_ID | quote }}
  {{- end }}
  {{- if .Values.secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.AWS_SECRET_ACCESS_KEY | quote }}
  {{- end }}
{{- end }}
