apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "katra.fullname" . }}-config
  labels:
    {{- include "katra.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.PORT | default "9002" | quote }}
  MCP_PORT: {{ .Values.config.MCP_PORT | default "3100" | quote }}
  HOST: {{ .Values.config.HOST | default "0.0.0.0" | quote }}
  DATABASE_NAME: {{ .Values.config.DATABASE_NAME | default "katra" | quote }}
  {{- if .Values.config.LLM_PROVIDER }}
  LLM_PROVIDER: {{ .Values.config.LLM_PROVIDER | quote }}
  {{- end }}
  {{- if .Values.config.LLM_MODEL }}
  LLM_MODEL: {{ .Values.config.LLM_MODEL | quote }}
  {{- end }}
  {{- if .Values.config.LLM_BASE_URL }}
  LLM_BASE_URL: {{ .Values.config.LLM_BASE_URL | quote }}
  {{- end }}
  {{- if .Values.config.EMBEDDING_PROVIDER }}
  EMBEDDING_PROVIDER: {{ .Values.config.EMBEDDING_PROVIDER | quote }}
  {{- end }}
  {{- if .Values.config.EMBEDDING_MODEL }}
  EMBEDDING_MODEL: {{ .Values.config.EMBEDDING_MODEL | quote }}
  {{- end }}
  {{- if .Values.config.S3_ENDPOINT }}
  S3_ENDPOINT: {{ .Values.config.S3_ENDPOINT | quote }}
  {{- end }}
  {{- if .Values.config.S3_REGION }}
  S3_REGION: {{ .Values.config.S3_REGION | quote }}
  {{- end }}
  {{- if .Values.config.S3_BUCKET_NAME }}
  S3_BUCKET_NAME: {{ .Values.config.S3_BUCKET_NAME | quote }}
  {{- end }}
  {{- if .Values.config.MULTI_TENANT }}
  MULTI_TENANT: {{ .Values.config.MULTI_TENANT | quote }}
  {{- end }}
  {{- if .Values.config.TENANT_ISOLATION }}
  TENANT_ISOLATION: {{ .Values.config.TENANT_ISOLATION | quote }}
  {{- end }}
