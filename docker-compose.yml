# ════════════════════════════════════════════════════════════════════
#  Katra — Cognitive Memory for AI Agents
#  docker-compose.yml
#
#  Quick start:
#    1. Copy .env.example → .env, edit as needed
#    2. docker-compose up -d --build
#    3. Point your agent at http://localhost:3112/mcp
#
#  USB storage:
#    Set DATA_DIR=/mnt/usb-secrets/katra in .env
#    (or any path — all persistent data goes there)
# ════════════════════════════════════════════════════════════════════

services:
  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: katra-mongo
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-katra-local-dev}
    command: ["--bind_ip_all", "--auth"]
    networks:
      - katra-net

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: katra-redis
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    command: redis-server --appendonly yes
    networks:
      - katra-net

  # ── MinIO (S3-compatible object storage for assets) ──────────────
  minio:
    image: minio/minio:latest
    container_name: katra-minio
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS:-katra-local-dev}
    command: server /data --console-address ":9001"
    networks:
      - katra-net

  # ── Katra Server ─────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: katra/server:latest
    container_name: katra-server
    restart: unless-stopped
    ports:
      - "${HOST_MCP_PORT:-3112}:3100"   # MCP endpoint — point your agent here
      - "${HOST_API_PORT:-9012}:9002"   # Admin REST API
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
      - minio
    networks:
      - katra-net

networks:
  katra-net:
    driver: bridge
